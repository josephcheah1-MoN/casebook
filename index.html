  const rules = [tt('禁用提示', 'no hints'), tt('仅一次指控', 'one accusation')];
  if (G.exam.limit) rules.push(tt(`限时 ${Math.round(G.exam.limit / 60)} 分钟`, `${Math.round(G.exam.limit / 60)}-min limit`));
  return `<div class="exam-bar">⚖️ ${rankName(G.exam.r)} → ${rankName(G.exam.r + 1)} ${tt('晋升考核', 'Promotion Exam')} · ${rules.join(' · ')}${G.exam.limit ? ` · ${tt('剩余', 'left')} <b id="examClock">--:--</b>` : ''}</div>`;
}
function showExamIntro() {
  const r = stats.rank;
  openModal(`
    <h2>⚖️ ${tt('晋升考核', 'Promotion Exam')}</h2>
    <p style="font-size:14px">${tt(`通过这场考核，你将从<b>${rankName(r)}</b>晋升为<b style="color:var(--seal)">${rankName(r + 1)}</b>。`, `Pass this exam to rise from <b>${rankName(r)}</b> to <b style="color:var(--seal)">${rankName(r + 1)}</b>.`)}</p>
    <div class="truth">${tt(`考核规则：${examDesc(r)}。<br>指控错误、超时或中途弃考都计为失败——失败不掉段，但需再成功破 3 案才能重考。`, `Exam rules: ${examDesc(r)}.<br>A wrong accusation, timeout, or walking out all count as failure — you keep your rank, but must solve 3 more cases before retrying.`)}</div>
    <div class="m-actions">
      <button class="btn" id="mNo">${tt('再准备准备', 'Not yet')}</button>
      <button class="btn primary" id="mGo2">${tt('进入考核', 'Begin Exam')}</button>
    </div>`);
  document.getElementById('mNo').addEventListener('click', closeModal);
  document.getElementById('mGo2').addEventListener('click', () => { closeModal(); startExamCase(); });
}
function startExamCase() {
  tutEnd();
  const r = stats.rank;
  const ex = RANK_LADDER[r].exam;
  const begin = () => {
    const tweak = { n: ex.n, allowDirect: false, maxDirect: 0, indirectFirst: true, relSeeds: ex.allRel ? 4 : 3, minRel: ex.allRel ? 4 : 2 };
    const recent = pref.recent || { s: [], w: [], l: [] };
    const c = ENGINE.generateCase(ex.diffId, (Date.now() ^ (Math.random() * 0xffffffff)) >>> 0, recent, tweak);
    if (!c) { alert(tt('考核案卷生成失败，请再试一次', 'Exam case generation failed — please try again')); return; }
    const n = c.n;
    const empty = () => Array.from({ length: n }, () => new Array(n).fill(0));
    G = {
      case: c,
      marks: { SW: empty(), SL: empty(), WL: empty() },
      hinted: [],
      struck: new Array(c.clues.length).fill(false),
      hintsLeft: 0, attempts: 0, startedAt: Date.now(), undoStack: [],
      exam: { r, limit: ex.timeLimit || 0 },
    };
    saveGame();
    renderCase();
  };
  if (G) confirmModal(tt('进入考核将放弃当前进行中的案件，确定吗？', 'Entering the exam will discard the case in progress. Continue?'), begin);
  else begin();
}
function examPass() {
  stopExamTimer();
  stats.rank++;
  stats.rankProgress = 0;
  const newName = RANK_LADDER[stats.rank].name;
  stats.licenses.push({ rank: newName, date: Date.now() });
  save(LS_STATS, stats);
  G = null;
  saveGame();
  openModal(`
    <div class="stamp-wrap"><span class="stamp">${tt('晋级', 'PROMOTED')}</span></div>
    <h2 style="text-align:center">${tt('考核通过！', 'Exam Passed!')}</h2>
    <div class="license-card">
      <div class="lc-title">${tt('谜 案 手 册 · 侦 探 执 照', 'CASEBOOK · DETECTIVE LICENSE')}</div>
      <div class="lc-rank">${isEn() ? RANK_LADDER[stats.rank].en : newName}</div>
      <div class="lc-meta">${tt(`颁发日期 ${new Date().toLocaleDateString()} · 一案定音，凭真才实学`, `Issued ${new Date().toLocaleDateString()} · One case, one verdict — earned on merit`)}</div>
    </div>
    <p style="font-size:13px;color:var(--ink-soft);text-align:center;margin-top:10px">${stats.rank < RANK_LADDER.length - 1 ? tt(`段位进度已重置——攒满 ${RANK_LADDER[stats.rank].threshold} 即可挑战下一级考核（${examDesc(stats.rank)}）。`, `Rank progress reset — fill ${RANK_LADDER[stats.rank].threshold} to attempt the next exam (${examDesc(stats.rank)}).`) : tt('你已站上侦探界的巅峰——传奇之名，实至名归。', 'You stand at the very summit — the name Legendary is yours by right.')}</p>
    <div class="m-actions">
      <button class="btn" id="mHome">${tt('回档案室', 'Back to Office')}</button>
      <button class="btn primary" id="mNext">${tt('下一案', 'Next Case')}</button>
    </div>`);
  document.getElementById('mHome').addEventListener('click', () => { closeModal(); renderHome(); });
  document.getElementById('mNext').addEventListener('click', () => { closeModal(); startCase(pref.diff); });
  setTimeout(() => playSfx('stamp', true), 250);
  setTimeout(() => playSfx('win'), 520);
}
function examFail(reason) {
  stopExamTimer();
  stats.examCooldown = 3;
  save(LS_STATS, stats);
  G = null;
  saveGame();
  openModal(`
    <div class="stamp-wrap"><span class="stamp grey">${tt('考核失败', 'EXAM FAILED')}</span></div>
    <h2 style="text-align:center">${tt('还差一口气', 'So Close')}</h2>
    <p style="font-size:14px;text-align:center">${esc(reason)}<br>${tt('段位保留不降。再成功破 <b>3</b> 案即可重新挑战。', 'Your rank is safe. Solve <b>3</b> more cases to try again.')}</p>
    <div class="m-actions">
      <button class="btn" id="mHome">${tt('回档案室', 'Back to Office')}</button>
      <button class="btn primary" id="mNext">${tt('去破案', 'Go Solve Cases')}</button>
    </div>`);
  document.getElementById('mHome').addEventListener('click', () => { closeModal(); renderHome(); });
  document.getElementById('mNext').addEventListener('click', () => { closeModal(); startCase(pref.diff); });
  setTimeout(() => playSfx('stamp', false), 250);
  setTimeout(() => playSfx('fail'), 520);
}

// ---------- 背景音乐（原创氛围曲，Web Audio 实时合成，无外部资源） ----------
const BGM = (() => {
  let ctx = null, master = null, sfxBus = null, noiseBuf = null;
  let chordTimer = null, popTimer = null, playing = false, step = 0;
  // 原创侦探推理循环（D 小调"蹑手蹑脚"式）：Dm → Gm7 → B♭7 → A7
  // walk = 低音潜行走线（含半音下探，每拍一音），stab = 反拍小调和弦轻点
  const BPM = 96, SPB = 60 / BPM, SEG = SPB * 8; // 每个和弦 2 小节
  const CHORDS = [
    { walk: [73.42, 87.31, 82.41, 77.78], stab: [293.66, 349.23, 440.00] },    // Dm：D-F-E-E♭ 半音下探
    { walk: [98.00, 116.54, 110.00, 103.83], stab: [233.08, 293.66, 349.23] }, // Gm7
    { walk: [116.54, 146.83, 130.81, 123.47], stab: [233.08, 293.66, 415.30] },// B♭7
    { walk: [110.00, 138.59, 164.81, 98.00], stab: [277.18, 329.63, 392.00] }, // A7
  ];
  const MOTIFS = [ // [拍偏移, 频率]，D 小调悬疑小动机（0.66 = 摇摆后半拍）
    [[0, 587.33], [0.66, 698.46], [1, 659.26], [2.66, 587.33]],
    [[0, 880.00], [0.66, 783.99], [1.66, 698.46], [2.66, 659.26], [3.33, 587.33]],
    [[0, 587.33], [0.66, 554.37], [1, 587.33], [2, 698.46], [2.66, 659.26]],
    [[0, 698.46], [1, 659.26], [1.66, 698.46], [2, 880.00], [3, 783.99]],
  ];

  function ensureCtx() {
    if (ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    ctx = new AC();
    master = ctx.createGain();
    master.gain.value = 0;
    master.connect(ctx.destination);
    sfxBus = ctx.createGain(); // 音效独立通道：关音乐不影响音效
    sfxBus.gain.value = 1;
    sfxBus.connect(ctx.destination);
    const len = Math.floor(ctx.sampleRate * 2);
    noiseBuf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  }
  function bassPluck(freq, t) { // 拨弦低音：短促有弹性
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.09, t);
    g.gain.exponentialRampToValueAtTime(0.0006, t + 0.35);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.4);
  }
  function stab(notes, t) { // 反拍和弦轻点
    for (const freq of notes) {
      const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
      const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1300;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.016, t);
      g.gain.exponentialRampToValueAtTime(0.0004, t + 0.22);
      o.connect(f); f.connect(g); g.connect(master);
      o.start(t); o.stop(t + 0.26);
    }
  }
  function pluck(freq, t) { // 旋律拨片（略暗的音色，配合悬疑氛围）
    const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1800;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.042, t);
    g.gain.exponentialRampToValueAtTime(0.0004, t + 1.2);
    o.connect(f); f.connect(g); g.connect(master);
    o.start(t); o.stop(t + 1.3);
  }
  function tone(freq, t, dur, vol, type, lp) { // 乐句音符（走音效通道，供结案/悬案短曲使用）
    const o = ctx.createOscillator(); o.type = type; o.frequency.value = freq;
    const fl = ctx.createBiquadFilter(); fl.type = 'lowpass'; fl.frequency.value = lp;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0005, t + dur);
    o.connect(fl); fl.connect(g); g.connect(sfxBus);
    o.start(t); o.stop(t + dur + 0.05);
  }
  function duckMusic(t, dur) { // 短曲期间压低背景音乐
    if (!playing) return;
    master.gain.cancelScheduledValues(t);
    master.gain.setValueAtTime(master.gain.value, t);
    master.gain.linearRampToValueAtTime(0.10, t + 0.15);
    master.gain.setValueAtTime(0.10, t + dur - 0.6);
    master.gain.linearRampToValueAtTime(1, t + dur);
  }
  function pop(t, vol) { // 老唱片的轻微噼啪
    const src = ctx.createBufferSource(); src.buffer = noiseBuf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 3500; f.Q.value = 1.2;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
    src.connect(f); f.connect(g); g.connect(master);
    src.start(t, Math.random() * 1.5, 0.06);
  }
  // ---- 音效合成（走 sfxBus 独立通道） ----
  function blipTo(f0, f1, t, dur, vol) {
    const o = ctx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(f1, t + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0005, t + dur);
    o.connect(g); g.connect(sfxBus);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function burst(t, dur, freq, vol, type, q) {
    const src = ctx.createBufferSource(); src.buffer = noiseBuf;
    const f = ctx.createBiquadFilter(); f.type = type; f.frequency.value = freq; f.Q.value = q;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0003, t + dur);
    src.connect(f); f.connect(g); g.connect(sfxBus);
    src.start(t, Math.random() * 1.2, dur + 0.05);
  }
  function scratch(t, down) { // 铅笔划线：滤波噪声扫频
    const dur = 0.13;
    const src = ctx.createBufferSource(); src.buffer = noiseBuf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 2.5;
    f.frequency.setValueAtTime(down ? 1600 : 800, t);
    f.frequency.exponentialRampToValueAtTime(down ? 700 : 1500, t + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.055, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0005, t + dur);
    src.connect(f); f.connect(g); g.connect(sfxBus);
    src.start(t, Math.random() * 1.2, dur + 0.05);
  }
  function pageTurn(t, vol) { // 翻页：摩擦滑动"沙"（带通上扫、中段鼓起）+ 纸页落定"啪"
    const src = ctx.createBufferSource(); src.buffer = noiseBuf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 0.8;
    f.frequency.setValueAtTime(700, t);
    f.frequency.exponentialRampToValueAtTime(3800, t + 0.26);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0015, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.17);
    g.gain.exponentialRampToValueAtTime(0.0015, t + 0.30);
    src.connect(f); f.connect(g); g.connect(sfxBus);
    src.start(t, Math.random() * 1.2, 0.36);
    const src2 = ctx.createBufferSource(); src2.buffer = noiseBuf; // 落定的"啪"
    const f2 = ctx.createBiquadFilter(); f2.type = 'highpass'; f2.frequency.value = 1200;
    const g2 = ctx.createGain();
    g2.gain.setValueAtTime(vol * 0.9, t + 0.27);
    g2.gain.exponentialRampToValueAtTime(0.0005, t + 0.34);
    src2.connect(f2); f2.connect(g2); g2.connect(sfxBus);
    src2.start(t + 0.27, Math.random() * 1.2, 0.1);
  }
  function thump(t, strong) { // 盖章闷响：低频下坠 + 低通噪声体
    const o = ctx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(55, t + 0.18);
    const g = ctx.createGain();
    g.gain.setValueAtTime(strong ? 0.32 : 0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o.connect(g); g.connect(sfxBus);
    o.start(t); o.stop(t + 0.25);
    burst(t, 0.05, 350, strong ? 0.11 : 0.06, 'lowpass', 0.7);
  }
  function sfxPlay(name, arg) {
    ensureCtx();
    const go = () => {
      const t = ctx.currentTime + 0.01;
      if (name === 'tap') {
        if (arg === 2) blipTo(523, 740, t, 0.07, 0.05);            // ✓ 清亮上挑
        else if (arg === 1) { blipTo(230, 175, t, 0.05, 0.045); burst(t, 0.03, 2500, 0.025, 'bandpass', 1); } // ✕ 铅笔轻点
        else burst(t, 0.04, 1800, 0.02, 'bandpass', 0.8);          // 清除：轻擦
      } else if (name === 'strike') {
        scratch(t, !!arg);
      } else if (name === 'paper') { // 翻开案卷：连翻两页，第二页轻一些
        pageTurn(t, 0.11);
        pageTurn(t + 0.34, 0.07);
      } else if (name === 'select') { // 难度选择确认音：轻快上挑
        blipTo(440, 587.33, t, 0.06, 0.055);
      } else if (name === 'stamp') {
        thump(t, arg !== false);
      } else if (name === 'win') { // 结案凯旋短曲：上行琶音 + 明亮收束（原创）
        duckMusic(t, 2.4);
        const seq = [523.25, 659.26, 783.99, 1046.50]; // C5 E5 G5 C6
        seq.forEach((f, i) => tone(f, t + i * 0.11, 0.3, 0.16, 'triangle', 2600));
        [261.63, 329.63, 392.00, 523.25].forEach(f => tone(f, t + 0.48, 1.5, 0.095, 'triangle', 1800));
        tone(130.81, t + 0.48, 1.5, 0.17, 'sine', 800);   // C3 低音托底
        tone(1567.98, t + 0.62, 0.5, 0.05, 'sine', 4200); // 高音闪光
      } else if (name === 'fail') { // 悬案叹息乐句：下行小调 + 暗淡收尾（原创）
        duckMusic(t, 2.6);
        const seq = [329.63, 293.66, 261.63, 246.94]; // E4 D4 C4 B3
        seq.forEach((f, i) => tone(f, t + i * 0.22, 0.42, 0.14, 'triangle', 1400));
        [220.00, 261.63, 329.63].forEach(f => tone(f, t + 0.95, 1.6, 0.085, 'triangle', 1000));
        tone(110.00, t + 0.95, 1.6, 0.14, 'sine', 600); // A2 低音
      }
    };
    if (ctx.state === 'running') go();
    else { try { ctx.resume().then(go).catch(() => {}); } catch (e) {} }
  }
  function scheduleChord() {
    if (!playing) return;
    const t0 = ctx.currentTime + 0.06;
    const ch = CHORDS[step % CHORDS.length];
    step++;
    // 潜行低音走线：每拍一音（含半音下探），走线循环两遍
    for (let b = 0; b < 8; b++) bassPluck(ch.walk[b % 4], t0 + b * SPB);
    // 反拍小调和弦轻点：第 2、4、6、8 拍
    for (const b of [1, 3, 5, 7]) stab(ch.stab, t0 + b * SPB);
    // 每段奏一个悬疑小动机，落在第 1 或第 2 小节
    const motif = MOTIFS[Math.floor(Math.random() * MOTIFS.length)];
    const base = Math.random() < 0.5 ? 0 : 4;
    for (const [beat, f] of motif) pluck(f, t0 + (base + beat) * SPB);
    chordTimer = setTimeout(scheduleChord, SEG * 1000);
  }
  function schedulePop() {
    if (!playing) return;
    pop(ctx.currentTime + 0.02, 0.008 + Math.random() * 0.014);
    popTimer = setTimeout(schedulePop, 250 + Math.random() * 1200);
  }
  function start() {
    ensureCtx();
    if (ctx.state === 'suspended') { try { ctx.resume(); } catch (e) {} }
    if (playing) return;
    playing = true; step = 0;
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.setValueAtTime(master.gain.value, ctx.currentTime);
    master.gain.linearRampToValueAtTime(1, ctx.currentTime + 2);
    scheduleChord();
    schedulePop();
  }
  function stop() {
    if (!playing) return;
    playing = false;
    clearTimeout(chordTimer); clearTimeout(popTimer);
    if (ctx) {
      master.gain.cancelScheduledValues(ctx.currentTime);
      master.gain.setValueAtTime(master.gain.value, ctx.currentTime);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
    }
  }
  return { start, stop, sfx: sfxPlay, isPlaying: () => playing, ctxState: () => (ctx ? ctx.state : 'none') };
})();

// 声音开关（三档循环：🔈 仅音效 → 🎵 音乐+音效 → 🔇 全静音），固定悬浮按钮
const AUDIO_MODES = ['sfx', 'all', 'mute'];
let audioMode = pref.audio || (pref.music ? 'all' : 'sfx');
if (!AUDIO_MODES.includes(audioMode)) audioMode = 'sfx';
const musicBtn = document.createElement('button');
musicBtn.className = 'music-btn';
musicBtn.setAttribute('aria-label', '声音开关：音效／音乐／静音');
document.body.appendChild(musicBtn);
function playSfx(name, arg) {
  if (audioMode === 'mute') return;
  BGM.sfx(name, arg);
}
function setMusicUI() {
  musicBtn.textContent = audioMode === 'all' ? '🎵' : audioMode === 'sfx' ? '🔈' : '🔇';
  musicBtn.classList.toggle('off', audioMode === 'mute');
}
setMusicUI();
musicBtn.addEventListener('click', () => {
  audioMode = AUDIO_MODES[(AUDIO_MODES.indexOf(audioMode) + 1) % AUDIO_MODES.length];
  pref.audio = audioMode;
  save(LS_PREF, pref);
  if (audioMode === 'all') BGM.start(); else BGM.stop();
  setMusicUI();
  playSfx('tap', 2); // 切换反馈音
});
// 上次开着音乐：等首次触屏再启动（移动端禁止自动播放）
if (audioMode === 'all') {
  document.addEventListener('pointerdown', () => {
    if (audioMode === 'all' && !BGM.isPlaying()) BGM.start();
  }, { once: true });
}
// 切后台停，回前台续（仅音乐）
let bgmWasPlaying = false;
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    bgmWasPlaying = BGM.isPlaying();
    if (bgmWasPlaying) BGM.stop();
  } else if (bgmWasPlaying && audioMode === 'all') {
    BGM.start();
    bgmWasPlaying = false;
  }
});

// ---------- 启动 ----------
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (G && document.getElementById('lgrid')) renderGrid(); }, 150);
});
if (G) renderCase(); else renderHome();
</script>
