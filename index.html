<title>谜案手册 · 口袋逻辑推理</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  :root {
    --bg: #EAE0C6;
    --card: #F6EFDC;
    --card2: #EFE6CC;
    --ink: #2B2416;
    --ink-soft: #77694C;
    --ink-faint: #A79A78;
    --seal: #B23327;
    --seal-ink: #FFF6EA;
    --seal-soft: rgba(178, 51, 39, 0.10);
    --rule: #D3C6A2;
    --rule-strong: #4A3F2A;
    --cell-bg: #FBF6E8;
    --cell-dead: #E2D7B8;
    --shadow: 0 2px 10px rgba(58, 46, 22, 0.14);
    --serif: 'Songti SC', 'STSongti-SC', 'Noto Serif SC', 'Noto Serif CJK SC', 'SimSun', serif;
    --sans: -apple-system, 'PingFang SC', 'HarmonyOS Sans SC', 'Microsoft YaHei UI', 'Microsoft YaHei', system-ui, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161B;
      --card: #1D2027;
      --card2: #23262F;
      --ink: #E9E3D1;
      --ink-soft: #9A927C;
      --ink-faint: #6B6553;
      --seal: #E0584A;
      --seal-ink: #1A0F0C;
      --seal-soft: rgba(224, 88, 74, 0.14);
      --rule: #33384420;
      --rule: #333844;
      --rule-strong: #8A8168;
      --cell-bg: #262A33;
      --cell-dead: #191C22;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }
  }
  :root[data-theme="light"] {
    --bg: #EAE0C6; --card: #F6EFDC; --card2: #EFE6CC; --ink: #2B2416;
    --ink-soft: #77694C; --ink-faint: #A79A78; --seal: #B23327; --seal-ink: #FFF6EA;
    --seal-soft: rgba(178, 51, 39, 0.10); --rule: #D3C6A2; --rule-strong: #4A3F2A;
    --cell-bg: #FBF6E8; --cell-dead: #E2D7B8; --shadow: 0 2px 10px rgba(58, 46, 22, 0.14);
  }
  :root[data-theme="dark"] {
    --bg: #14161B; --card: #1D2027; --card2: #23262F; --ink: #E9E3D1;
    --ink-soft: #9A927C; --ink-faint: #6B6553; --seal: #E0584A; --seal-ink: #1A0F0C;
    --seal-soft: rgba(224, 88, 74, 0.14); --rule: #333844; --rule-strong: #8A8168;
    --cell-bg: #262A33; --cell-dead: #191C22; --shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
    overscroll-behavior-y: contain;
  }
  button { font-family: inherit; color: inherit; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 16px 14px 40px; }
  .hidden { display: none !important; }

  /* ---------- shared ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border: 1.5px solid var(--rule-strong); border-radius: 4px;
    background: var(--card); color: var(--ink);
    padding: 10px 18px; font-size: 15px; font-weight: 600;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    transition: transform 0.06s ease, background 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--seal); border-color: var(--seal); color: var(--seal-ink); }
  .btn.small { padding: 5px 10px; font-size: 12.5px; font-weight: 500; border-color: var(--rule); color: var(--ink-soft); }
  .btn:disabled { opacity: 0.4; pointer-events: none; }
  .btn:focus-visible, .cell:focus-visible, .chip:focus-visible { outline: 2px solid var(--seal); outline-offset: 2px; }

  .sec { border: 1.5px solid var(--rule-strong); background: var(--card); border-radius: 4px; margin-top: 26px; padding: 14px 12px 12px; box-shadow: var(--shadow); }
  .sec-tab {
    display: inline-block; position: relative; top: -26px; margin-bottom: -22px; margin-left: 2px;
    background: var(--card); border: 1.5px solid var(--rule-strong); border-radius: 3px 3px 0 0;
    padding: 1px 12px 0; font-size: 11.5px; font-weight: 700; letter-spacing: 4px; color: var(--ink-soft);
  }
  .sec-head-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: -18px; position: relative; top: -26px; }
  .sec-head-row .sec-tab { top: 0; margin-bottom: 0; }
  .sec-tools { display: flex; gap: 6px; }

  /* ---------- home ---------- */
  .cover {
    border: 2px solid var(--rule-strong); border-radius: 5px; background: var(--card);
    box-shadow: var(--shadow); padding: 30px 20px 24px; position: relative; overflow: hidden; text-align: center;
    background-image: radial-gradient(var(--rule) 0.8px, transparent 0.8px);
    background-size: 14px 14px;
  }
  .cover::after {
    content: '绝密'; position: absolute; top: 16px; right: 12px;
    font-family: var(--serif); font-weight: 900; font-size: 13px; letter-spacing: 5px; padding: 3px 8px 3px 12px;
    color: var(--seal); border: 2px solid var(--seal); border-radius: 4px; transform: rotate(8deg); opacity: 0.85;
  }
  .cover .eye { font-size: 44px; line-height: 1; margin-bottom: 8px; }
  .cover h1 {
    font-family: var(--serif); font-weight: 900; font-size: 42px; letter-spacing: 10px; text-indent: 10px;
    margin: 4px 0 2px; line-height: 1.2; text-wrap: balance;
  }
  .cover .sub { font-size: 12.5px; letter-spacing: 4px; color: var(--ink-soft); margin-bottom: 14px; }
  .cover .desc { font-size: 13.5px; color: var(--ink-soft); max-width: 34em; margin: 0 auto; text-align: center; }

  .stats { display: flex; gap: 8px; margin-top: 14px; }
  .stat { flex: 1; border: 1.5px solid var(--rule); border-radius: 4px; background: var(--card); padding: 8px 4px; text-align: center; }
  .stat b { display: block; font-family: var(--mono); font-variant-numeric: tabular-nums; font-size: 20px; line-height: 1.3; }
  .stat span { font-size: 11px; letter-spacing: 2px; color: var(--ink-soft); }
  .stat .rank-title { font-family: var(--serif); font-weight: 900; font-size: 17px; }

  .diffs { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .diff {
    display: flex; align-items: center; gap: 12px; text-align: left; width: 100%;
    border: 1.5px solid var(--rule); border-radius: 4px; background: var(--card); padding: 10px 12px; cursor: pointer;
  }
  .diff.sel { border-color: var(--seal); background: var(--seal-soft); }
  .diff .d-badge {
    font-family: var(--serif); font-weight: 900; font-size: 17px; letter-spacing: 2px;
    border: 1.5px solid var(--rule-strong); border-radius: 4px; padding: 4px 8px; white-space: nowrap;
  }
  .diff.sel .d-badge { border-color: var(--seal); color: var(--seal); }
  .diff .d-info { flex: 1; }
  .diff .d-name { font-weight: 700; font-size: 14.5px; }
  .diff .d-desc { font-size: 12px; color: var(--ink-soft); }
  .diff .d-check { font-size: 18px; color: var(--seal); opacity: 0; }
  .diff.sel .d-check { opacity: 1; }

  .home-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .home-actions .btn.primary { padding: 14px; font-size: 17px; letter-spacing: 6px; font-family: var(--serif); font-weight: 900; }
  .tip { font-size: 12px; color: var(--ink-faint); text-align: center; margin-top: 18px; }
  .linkish { background: none; border: none; padding: 8px; font-size: 13.5px; color: var(--ink-soft); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; }

  /* ---------- case header ---------- */
  .case-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .case-title { font-family: var(--serif); font-weight: 900; font-size: 25px; letter-spacing: 2px; margin: 8px 0 2px; text-wrap: balance; }
  .case-meta { font-size: 11.5px; letter-spacing: 2px; color: var(--ink-faint); font-family: var(--mono); }
  .case-intro { font-size: 13.5px; color: var(--ink-soft); margin-top: 6px; }
  .forensic {
    margin-top: 12px; border: 1.5px dashed var(--seal); border-radius: 4px; background: var(--seal-soft);
    padding: 9px 12px; font-size: 13.5px; font-weight: 600;
  }
  .forensic .f-label { display: block; font-size: 10.5px; letter-spacing: 3px; color: var(--seal); font-weight: 700; margin-bottom: 2px; }

  /* ---------- dossier cards ---------- */
  .group-label { font-size: 11px; letter-spacing: 3px; color: var(--ink-soft); font-weight: 700; margin: 12px 0 6px 2px; }
  .group-label:first-of-type { margin-top: 2px; }
  .cards { display: flex; flex-direction: column; gap: 6px; }
  .pcard { display: flex; gap: 10px; align-items: flex-start; border: 1px solid var(--rule); border-radius: 4px; background: var(--card2); padding: 8px 10px; }
  .pcard .p-emoji { font-size: 22px; line-height: 1.35; }
  .pcard .p-body { flex: 1; min-width: 0; }
  .pcard .p-name { font-weight: 700; font-size: 14px; }
  .pcard .p-desc { font-size: 12px; color: var(--ink-soft); }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
  .attr-chip { font-size: 10.5px; border: 1px solid var(--rule); border-radius: 999px; padding: 0 7px; color: var(--ink-soft); background: var(--card); }
  .attr-chip.scene { border-color: var(--seal); color: var(--seal); font-weight: 700; }
  .attr-chip.motive { border-style: dashed; border-color: var(--ink-soft); font-weight: 600; }
  .p-quote {
    display: block; margin-top: 5px; padding-left: 8px;
    border-left: 2px solid var(--rule-strong);
    font-size: 12.5px; line-height: 1.55; color: var(--ink-soft);
  }

  /* ---------- 成长系统 ---------- */
  .stats.four .stat b { font-size: 17px; }
  .stats.four .rank-title { font-size: 13px; }
  .stat .shield { font-style: normal; font-size: 12px; margin-left: 2px; }
  .equip-chip {
    display: inline-block; margin: 2px auto 10px; font-size: 12px; letter-spacing: 2px;
    color: var(--seal); border: 1px solid var(--seal); border-radius: 999px; padding: 1px 10px;
  }
  .row-btns { display: flex; gap: 10px; }
  .row-btns .btn { flex: 1; }
  .grade-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; margin-left: 4px; flex: none;
    border: 2px solid var(--ink-soft); border-radius: 4px; transform: rotate(-6deg);
    font-family: var(--serif); font-weight: 900; font-size: 15px; color: var(--ink-soft);
  }
  .grade-badge.g-S, .grade-badge.g-A { border-color: var(--seal); color: var(--seal); }
  .grade-badge.g-C, .grade-badge.g-D { border-color: var(--ink-faint); color: var(--ink-faint); }
  .score-rows { border: 1px solid var(--rule); border-radius: 4px; background: var(--card2); padding: 8px 12px; margin-top: 10px; }
  .score-rows .row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13.5px; padding: 2px 0; opacity: 0; animation: rowIn 0.35s ease forwards;
  }
  .score-rows .row.total { border-top: 1.5px solid var(--rule-strong); margin-top: 4px; padding-top: 6px; font-weight: 700; font-size: 15px; }
  @keyframes rowIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .score-rows .row { animation: none; opacity: 1; } }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .mini-chip { padding: 3px 9px; font-size: 12px; }
  .arch-card { border: 1px solid var(--rule); border-radius: 4px; background: var(--card2); padding: 9px 11px; }
  .ac-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .ac-title { font-weight: 700; font-size: 14.5px; }
  .ac-meta { font-size: 11px; color: var(--ink-faint); margin: 2px 0 4px; }
  .ac-meta .exon { color: var(--seal); }
  .ac-line { font-size: 12.5px; color: var(--ink-soft); }
  .arch-card .reopen { margin-top: 6px; }
  .title-row { border: 1px solid var(--rule); border-radius: 4px; background: var(--card2); padding: 8px 10px; margin-bottom: 8px; }
  .title-row.done { border-color: var(--seal); }
  .t-head { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  .t-prog { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); }
  .t-desc { font-size: 12px; color: var(--ink-soft); margin: 2px 0 6px; }
  .pbar { height: 6px; border-radius: 3px; background: var(--rule); overflow: hidden; }
  .pbar i { display: block; height: 100%; background: var(--seal); }
  .save-box {
    width: 100%; height: 64px; resize: none;
    border: 1px solid var(--rule); border-radius: 4px;
    background: var(--card2); color: var(--ink);
    font-family: var(--mono); font-size: 10px; line-height: 1.4;
    padding: 6px; word-break: break-all;
  }

  /* ---------- 段位与考核 ---------- */
  .rank-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 15px; }
  .exam-btn { width: 100%; margin-top: 10px; font-family: var(--serif); font-weight: 900; letter-spacing: 2px; }
  .exam-bar {
    margin-top: 8px; border: 1.5px solid var(--seal); border-radius: 4px; background: var(--seal-soft);
    padding: 6px 10px; font-size: 12.5px; font-weight: 700; color: var(--seal);
  }
  .license-card {
    border: 2.5px solid var(--seal); border-radius: 6px; background: var(--card2);
    padding: 14px; text-align: center; margin-top: 10px;
  }
  .license-card .lc-title { font-size: 11px; letter-spacing: 5px; color: var(--ink-soft); }
  .license-card .lc-rank { font-family: var(--serif); font-weight: 900; font-size: 30px; letter-spacing: 8px; color: var(--seal); margin: 4px 0 2px; }
  .license-card .lc-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); }

  /* ---------- 新手教学 ---------- */
  .tut-panel {
    position: fixed; left: 10px; right: 10px; bottom: calc(92px + env(safe-area-inset-bottom)); z-index: 45;
    max-width: 540px; margin: 0 auto;
    background: var(--card); border: 2px solid var(--seal); border-radius: 6px;
    box-shadow: var(--shadow); padding: 10px 56px 10px 12px;
    font-size: 13.5px; line-height: 1.6;
  }
  .tut-panel .tp-tag { display: block; font-size: 10.5px; letter-spacing: 3px; color: var(--seal); font-weight: 700; margin-bottom: 2px; }
  .tut-panel .btn { margin-top: 8px; padding: 6px 14px; font-size: 13.5px; }
  body.tut-on .wrap, body.in-case.tut-on .wrap { padding-bottom: 320px; } /* 教学面板悬浮时，给页面留出滚动空间，避免挡住网格底部 */
  .cell.tut { outline: 3px solid var(--seal); outline-offset: 1px; animation: tutPulse 1.1s ease-in-out infinite; }
  @keyframes tutPulse { 0%, 100% { outline-color: var(--seal); } 50% { outline-color: transparent; } }
  @media (prefers-reduced-motion: reduce) { .cell.tut { animation: none; } }
  .mini-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  @media (min-width: 420px) { .mini-cards { grid-template-columns: 1fr 1fr 1fr; } }
  .mini { border: 1px solid var(--rule); border-radius: 4px; background: var(--card2); padding: 7px 9px; }
  .mini .p-name { font-size: 13px; font-weight: 700; }
  .mini .m-emoji { font-size: 18px; }

  /* ---------- clues ---------- */
  .clues { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .clue {
    display: flex; gap: 9px; align-items: flex-start; border: 1px solid var(--rule); border-radius: 4px;
    background: var(--card2); padding: 8px 10px; cursor: pointer; font-size: 13.5px;
  }
  .clue .c-num {
    font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--seal);
    border: 1px solid var(--seal); border-radius: 3px; padding: 0 5px; margin-top: 3px; white-space: nowrap;
  }
  .clue.struck { opacity: 0.42; }
  .clue.struck .c-text { text-decoration: line-through; text-decoration-color: var(--seal); }
  .clue-hint { font-size: 11.5px; color: var(--ink-faint); margin: 8px 2px 0; }
  .rule-note {
    font-size: 12px; line-height: 1.6; color: var(--ink-soft);
    border: 1px dashed var(--rule-strong); border-radius: 4px;
    background: var(--card2); padding: 8px 10px; margin: 0 0 8px;
  }

  /* ---------- logic grid ---------- */
  .grid-scroll { overflow-x: auto; padding-bottom: 4px; }
  .lgrid { display: grid; gap: 2px; min-width: 100%; width: max-content; margin: 0 auto; }
  .gh {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 2px;
    padding: 4px 0 3px; border-radius: 3px; background: var(--card2); border: 1px solid var(--rule);
    min-height: 80px;
  }
  .gh .h-emoji { font-size: 15px; line-height: 1; }
  .gh .h-name { writing-mode: vertical-rl; font-size: 9.5px; letter-spacing: 1px; color: var(--ink-soft); max-height: 56px; overflow: hidden; white-space: nowrap; }
  .gl {
    display: flex; align-items: center; gap: 4px; padding: 0 5px; border-radius: 3px;
    background: var(--card2); border: 1px solid var(--rule); overflow: hidden;
  }
  .gl .l-emoji { font-size: 13px; }
  .gl .l-name { font-size: 10px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px; }
  .corner { display: flex; align-items: flex-end; justify-content: flex-start; padding: 3px 4px; font-size: 9px; color: var(--ink-faint); line-height: 1.5; }
  .cell {
    border: 1px solid var(--rule); border-radius: 3px; background: var(--cell-bg);
    aspect-ratio: 1; width: var(--cell); padding: 0; cursor: pointer;
    font-size: calc(var(--cell) * 0.52); line-height: 1; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s ease;
  }
  .cell.no { color: var(--ink-faint); }
  .cell.yes { color: var(--seal); background: var(--seal-soft); border-color: var(--seal); }
  .cell.hinted { border-style: dashed; border-color: var(--seal); }
  .cell.flash { animation: cellFlash 0.7s ease; }
  @keyframes cellFlash { 0% { background: var(--seal); } 100% { background: var(--seal-soft); } }
  .dead { background: var(--cell-dead); border-radius: 3px; opacity: 0.55; }
  .gsep-l { margin-left: 5px; }
  .gsep-t { margin-top: 5px; }
  .legend { font-size: 11px; color: var(--ink-faint); margin-top: 8px; text-align: center; }
  .legend b { color: var(--seal); }

  /* ---------- bottom bar ---------- */
  .dock {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
    border-top: 1.5px solid var(--rule-strong);
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  }
  .dock-inner { max-width: 560px; margin: 0 auto; display: flex; gap: 10px; }
  .dock .btn { flex: 1; padding: 12px 8px; }
  .dock .btn.primary { flex: 1.6; font-family: var(--serif); font-weight: 900; letter-spacing: 4px; font-size: 16px; }
  body.in-case .wrap { padding-bottom: 110px; }

  /* ---------- 音乐开关 ---------- */
  .music-btn {
    position: fixed; right: 12px; bottom: calc(14px + env(safe-area-inset-bottom)); z-index: 50;
    width: 40px; height: 40px; border-radius: 50%;
    border: 1.5px solid var(--rule-strong);
    background: color-mix(in srgb, var(--card) 88%, transparent);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    font-size: 17px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: var(--shadow); opacity: 0.92;
  }
  .music-btn.off { opacity: 0.5; filter: grayscale(1); }
  body.in-case .music-btn { bottom: calc(98px + env(safe-area-inset-bottom)); }

  /* ---------- modals ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 100; background: rgba(20, 15, 5, 0.55);
    display: flex; align-items: center; justify-content: center; padding: 18px;
  }
  .modal {
    width: 100%; max-width: 420px; max-height: 84vh; overflow-y: auto;
    background: var(--card); border: 2px solid var(--rule-strong); border-radius: 6px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35); padding: 20px 18px;
  }
  .modal h2 { font-family: var(--serif); font-weight: 900; font-size: 21px; letter-spacing: 3px; margin: 0 0 10px; }
  .modal .m-actions { display: flex; gap: 10px; margin-top: 18px; }
  .modal .m-actions .btn { flex: 1; }
  .pick-label { font-size: 11.5px; letter-spacing: 3px; color: var(--ink-soft); font-weight: 700; margin: 14px 0 6px; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    border: 1.5px solid var(--rule); border-radius: 999px; background: var(--card2);
    padding: 5px 12px; font-size: 13.5px; cursor: pointer; display: inline-flex; gap: 5px; align-items: center;
  }
  .chip.sel { border-color: var(--seal); background: var(--seal-soft); color: var(--seal); font-weight: 700; }

  .stamp-wrap { text-align: center; margin: 6px 0 14px; }

  if (cl.text && cl.vr === undefined) return cl.text; // 旧版存档兼容（当年烤死的中文）
  const vr = cl.vr || 0;
  const V = (arr) => arr[vr % arr.length];
  const en = lang === 'en';
  const S = cl.s != null ? eN(c.suspects[cl.s], lang) : '';
  const W = cl.w != null ? eN(c.weapons[cl.w], lang) : '';
  const L = cl.l != null ? eN(c.locations[cl.l], lang) : '';
  const S1 = cl.s1 != null ? eN(c.suspects[cl.s1], lang) : '';
  const S2 = cl.s2 != null ? eN(c.suspects[cl.s2], lang) : '';
  const L1 = cl.l1 != null ? eN(c.locations[cl.l1], lang) : '';
  const L2 = cl.l2 != null ? eN(c.locations[cl.l2], lang) : '';
  const W1 = cl.w1 != null ? eN(c.weapons[cl.w1], lang) : '';
  const W2 = cl.w2 != null ? eN(c.weapons[cl.w2], lang) : '';
  switch (cl.k) {
    case 'swNeg': return en ? V([
      `The investigation confirms ${S} was not carrying the ${W}.`,
      `Not a single print of ${S}'s was found on the ${W}.`,
      `A search of ${S}'s belongings turned up no ${W}.`,
    ]) : V([
      `调查确认，${S}并没有携带${W}。`,
      `${W}上采不到${S}的半枚指纹。`,
      `搜查过${S}的随身物品，没有${W}的影子。`,
      `可以排除：${S}手里的不是${W}。`,
    ]);
    case 'slNeg': return en ? V([
      `Several witnesses confirm ${S} was not in the ${L}.`,
      `${S} can't describe a single thing inside the ${L} — they were never there.`,
      `The ${L} holds no trace of ${S}.`,
    ]) : V([
      `多位证人证实，案发时${S}不在${L}。`,
      `${S}说不出${L}里任何一件陈设的样子——TA没去过那里。`,
      `${L}里没有留下${S}的任何痕迹。`,
      `${S}的不在场证明很扎实：案发时TA不在${L}。`,
    ]);
    case 'swPos': return en ? V([
      `More than one witness saw ${S} holding the ${W}.`,
    ]) : V([
      `不止一个人看见${S}拿着${W}。`,
      `${S}大方承认：那晚TA一直带着${W}。`,
    ]);
    case 'slPos': return en ? V([
      `${S} was seen in the ${L} all evening.`,
    ]) : V([
      `${S}被目击整晚待在${L}。`,
      `${S}的证词与仆人们的说法吻合：TA一直在${L}。`,
    ]);
    case 'wlPos': return en ? V([
      `Traces of the ${W} were found in the ${L} — its owner was there that night.`,
      `Whoever carried the ${W} was in the ${L}.`,
    ]) : V([
      `在${L}发现了${W}留下的痕迹——它的主人当时就在那里。`,
      `带着${W}的那个人，案发时正待在${L}。`,
      `${W}曾被短暂遗落在${L}，随后又被主人取走。`,
    ]);
    case 'wlNeg': return en ? V([
      `The ${W} was never brought into the ${L}.`,
      `No trace of the ${W} anywhere in the ${L}.`,
    ]) : V([
      `${W}从未被带进过${L}。`,
      `带着${W}的人，案发时并不在${L}。`,
      `${L}里查不到${W}的任何踪迹。`,
    ]);
    case 'attrW': {
      const v = cl.val;
      if (en) {
        const t = {
          hand: v ? [`Forensics matched the grip prints on the ${W}: its owner is left-handed.`]
                  : [`Forensics matched the grip prints on the ${W}: its owner is right-handed.`],
          height: v ? [`A servant glimpsed a tall figure carrying the ${W} down the corridor.`]
                    : [`A servant glimpsed a short figure carrying the ${W} down the corridor.`],
          glasses: v ? [`The maid remembers it clearly: whoever held the ${W} wore glasses.`]
                     : [`The maid remembers it clearly: whoever held the ${W} wore no glasses.`],
          hair: v ? [`A silver hair was caught on the ${W} — it belongs to its owner.`]
                  : [`A dark hair was caught on the ${W} — it belongs to its owner.`],
          smoker: v ? [`The ${W} reeks of tobacco — its owner is a heavy smoker.`]
                    : [`The ${W} is spotless, without a whiff of smoke — its owner never smokes.`],
        };
        return V(t[cl.key]);
      }
      const t = {
        hand: v ? [`鉴证科比对了${W}上的指纹：按握的方向表明，它的主人惯用左手。`, `${W}的握柄左侧磨得发亮——它的主人常年用左手握它。`]
                : [`鉴证科比对了${W}上的指纹：按握的方向表明，它的主人惯用右手。`, `${W}的握柄右侧磨得发亮——它的主人常年用右手握它。`],
        height: v ? [`一名仆人亲眼看见：拿着${W}的是一个高大的身影。`, `目击者记不清那张脸，只记得拿${W}的人个子很高。`]
                  : [`一名仆人亲眼看见：拿着${W}的是一个矮小的身影。`, `目击者记不清那张脸，只记得拿${W}的人个子不高。`],
        glasses: v ? [`女仆想起来了：拿着${W}的那个人，鼻梁上架着一副眼镜。`, `拿${W}的人曾停下来擦拭起雾的镜片——TA戴眼镜。`]
                   : [`女仆想起来了：拿着${W}的那个人，脸上没有戴眼镜。`, `不止一位目击者确认：拿${W}的人不戴眼镜。`],
        hair: v ? [`${W}的主人是银白头发——TA的一根发丝缠在了上面。`, `鉴证科确认：缠在${W}把手上的发丝来自它的主人，是银白色的。`]
                : [`${W}的主人是深色头发——TA的一根发丝缠在了上面。`, `鉴证科确认：缠在${W}把手上的发丝来自它的主人，是乌黑色的。`],
        smoker: v ? [`${W}的主人烟瘾不小——TA留在上面的烟灰和烟草味还没散去。`, `有人看见拿着${W}的人在楼梯间点了根烟。`]
                  : [`${W}的主人从不吸烟——上面干干净净，连一丝烟味都没有。`, `拿${W}的人一闻到烟味就皱眉躲开——TA不吸烟。`],
      };
      return V(t[cl.key]);
    }
    case 'attrL': {
      const v = cl.val;
      if (en) {
        const t = {
          hand: v ? [`The person in the ${L} is left-handed — the half-written note they left slants leftward.`]
                  : [`The person in the ${L} is right-handed — the half-written note they left slants rightward.`],
          height: v ? [`The person in the ${L} is tall — their hair brushed the top of the door frame.`]
                    : [`The person in the ${L} is short — they dragged a footstool over to reach the top shelf.`],
          glasses: v ? [`The person in the ${L} wears glasses — their lens cloth was found on the carpet.`]
                     : [`The butler saw the person in the ${L} clearly through the window: no glasses.`],
          hair: v ? [`The person in the ${L} is silver-haired — a strand was left on the chair back.`]
                  : [`The person in the ${L} is dark-haired — a strand was left on the chair back.`],
          smoker: v ? [`The person in the ${L} had just smoked — a still-warm cigarette butt sits in the ashtray.`]
                    : [`Not a trace of smoke in the ${L} all night — the person there never smokes.`],
        };
        return V(t[cl.key]);
      }
      const t = {
        hand: v ? [`${L}里的人惯用左手——TA留下的半页便条，笔迹是左手写的。`, `${L}里的人惯用左手：TA用过的茶杯，杯柄都转向左边。`]
                : [`${L}里的人惯用右手——TA留下的半页便条，笔迹是右手写的。`, `${L}里的人惯用右手：TA用过的茶杯，杯柄都转向右边。`],
        height: v ? [`${L}里的人个子很高——TA的头发蹭到了门框上沿。`, `${L}里的人留下的脚印步幅极大——TA是个高个子。`]
                  : [`${L}里的人个子不高——TA搬了脚凳才够到书架顶层。`, `${L}里的人留下的脚印又小又密——TA是个矮个子。`],
        glasses: v ? [`${L}里的人戴眼镜——TA的眼镜擦拭布落在了地毯上。`, `${L}里的人戴眼镜：TA的眼镜盒还敞在桌上。`]
                   : [`${L}的灯坏了一整晚，那里的人却行动自如——TA视力极好，不戴眼镜。`, `管家隔窗看清了${L}里的人：TA脸上没有眼镜。`],
        hair: v ? [`${L}里的人是银白头发——TA在椅背上留下了一根发丝。`, `${L}里的人是银白头发：沙发靠枕上粘着TA的发丝。`]
                : [`${L}里的人是深色头发——TA在椅背上留下了一根发丝。`, `${L}里的人是深色头发：沙发靠枕上粘着TA乌黑的发丝。`],
        smoker: v ? [`${L}里的人刚抽过烟——烟灰缸里留着TA的烟蒂，还温热。`, `${L}里的人烟瘾不小——TA把那里熏得满是烟味。`]
                  : [`${L}里的人从不吸烟——TA待了一整晚，那里连一点烟味都没有。`, `${L}里的人从不吸烟：TA手边的烟灰缸干干净净，一次没用过。`],
      };
      return V(t[cl.key]);
    }
    case 'wattrL': {
      const v = cl.val;
      if (en) {
        const t = {
          heavy: v ? [`The person in the ${L} carried something heavy — it left a drag mark across the floorboards.`]
                   : [`Witnesses say whoever entered the ${L} was carrying something small and light.`],
          metal: v ? [`The guard's metal detector rang out at the ${L} — the item there is metal.`]
                   : [`The metal detector stayed silent at the ${L} — the item there contains no metal.`],
          sharp: v ? [`The person in the ${L} carried a blade — a clean slit was left in the curtain.`]
                   : [`Forensics confirm: the item in the ${L} has no edge — it couldn't cut paper.`],
        };
        return V(t[cl.wkey]);
      }
      const t = {
        heavy: v ? [`${L}里的人带着一件沉重的物品——TA拖着它在木地板上留下了一道划痕。`, `${L}里的人带的东西分量很重，把地毯压出了深深的印子。`]
                 : [`目击者说，进${L}的人两手轻松，带的物件小巧轻便。`, `${L}里的人带的东西很轻，能随手提在指尖。`],
        metal: v ? [`保安的金属探测器对着${L}里那个人的随身物品响个不停——是金属的。`, `${L}里的人带的物品是金属的——放下时磕出了一声脆响。`]
                 : [`金属探测器扫过${L}里那个人的随身物品，毫无反应——不含金属。`, `${L}里的人带的物件磕在桌上声音闷闷的——不是金属。`],
        sharp: v ? [`${L}里的人带着利器——门帘上那道整齐的口子，就是TA的物品划开的。`, `${L}里的人带着开刃的物品——桌布上留下了一道干净利落的割痕。`]
                 : [`鉴证科确认：${L}里的人带的物品边缘圆钝，连纸都划不破。`, `${L}里的人带的是件钝物，没有开刃。`],
      };
      return V(t[cl.wkey]);
    }
    case 'lattrS': return en ? (cl.inMain
      ? V([`${S} never left the main house all night.`])
      : V([`${S} stepped outside the main house — there's fresh mud on their shoes.`])
    ) : (cl.inMain
      ? V([`${S}整晚都没有离开过主楼。`, `门房记得很清楚：${S}从未走出主楼一步。`, `${S}的鞋底干干净净——TA一直待在主楼里。`])
      : V([`${S}案发前后曾离开主楼，去了外面。`, `${S}的鞋底沾着新鲜的泥土——TA当时在主楼外。`, `${S}的外套上沾了夜露，TA肯定出过门。`])
    );
    case 'swOr': return en ? V([
      `The prints on the ${W} are smudged — forensics can only say it belongs to either ${S1} or ${S2}.`,
      `A maid glimpsed someone carrying the ${W} past the stairs — either ${S1} or ${S2}.`,
    ]) : V([
      `${W}上的指纹残缺不全，鉴证科只能确定：它的主人是${S1}或${S2}中的一人。`,
      `女仆隔着楼梯瞥见有人拿着${W}走过——背影要么是${S1}，要么是${S2}。`,
    ]);
    case 'slOr': return en ? V([
      `The servant delivering supper recalls: ${S} was either in the ${L1} or the ${L2}.`,
    ]) : V([
      `送夜宵的仆人到处找${S}，只记得TA要么在${L1}，要么在${L2}。`,
      `${S}的说法有些含糊：TA声称案发时待在${L1}或${L2}。`,
    ]);
    case 'wlOr': return en ? V([
      `Someone saw the ${W}, but can't recall whether it was in the ${L1} or the ${L2}.`,
    ]) : V([
      `有人见过${W}，但记不清是在${L1}还是${L2}。`,
      `鉴证科把${W}的下落缩小到两处：要么在${L1}，要么在${L2}。`,
    ]);
    case 'notMurderer': return en ? V([
      `After repeated checks, ${S} is cleared of suspicion — they were not at the crime scene.`,
    ]) : V([
      `经反复查证，${S}可以排除嫌疑——案发时TA不在案发现场。`,
      `${S}不是凶手：TA有过硬的证明，案发时不在案发现场。`,
    ]);
    case 'murdererAttrS': {
      const v = cl.val;
      if (en) return {
        hand: `The angle of the wounds shows the killer is ${v ? 'left' : 'right'}-handed.`,
        height: `A guest glimpsed a ${v ? 'tall' : 'short'} figure slipping into the crime scene.`,
        glasses: `A guest caught the killer's profile entering the scene: ${v ? 'wearing glasses' : 'no glasses'}.`,
        hair: `A ${v ? 'silver' : 'dark'} hair was clutched in the victim's hand — torn from the killer in the struggle.`,
        smoker: v ? 'A heavy smell of smoke lingers at the scene — the killer is a heavy smoker.' : 'Not a whiff of smoke at the scene — the killer does not smoke.',
      }[cl.key];
      return {
        hand: `现场行凶痕迹的角度显示：凶手惯用${v ? '左' : '右'}手。`,
        height: `有宾客在案发前，瞥见一个${v ? '高大' : '矮小'}的身影闪进了案发现场。`,
        glasses: `有宾客瞥见了进入案发现场那人的侧脸：TA${v ? '戴着眼镜' : '没戴眼镜'}。`,
        hair: `死者手里攥着一根${v ? '银白' : '乌黑'}的头发——那是挣扎时从凶手头上抓下来的。`,
        smoker: v ? '案发现场残留着浓重的烟味——凶手烟瘾不小。' : '案发现场没有一丝烟味——凶手不吸烟。',
      }[cl.key];
    }
    case 'murdererAttrW': {
      const v = cl.val;
      if (en) return {
        heavy: v ? 'The wounds are crushing — the coroner judges the weapon was heavy.' : 'No sign of anything heavy — the weapon was something light.',
        metal: v ? 'Metal particles were found in the wound — the weapon is made of metal.' : 'No metal residue in the wound — the weapon is not metal.',
        sharp: v ? 'Clean incisions on the body — the weapon has an edge.' : 'Only blunt trauma on the body — the weapon has no edge.',
      }[cl.wkey];
      return {
        heavy: v ? '死者的伤势沉重——法医判断，凶器分量十足。' : '现场没有重物挪动的迹象——凶器是件轻巧的物件。',
        metal: v ? '法医在死者伤处检出了金属微粒——凶器是金属制品。' : '死者伤处没有金属残留——凶器不是金属制品。',
        sharp: v ? '死者身上有整齐的切创——凶器开了刃。' : '死者身上没有任何割伤——凶器没有开刃。',
      }[cl.wkey];
    }
    case 'cmpH': return en ? V([
      `A servant saw the one carrying the ${W1} pass the one carrying the ${W2} — the former stood a full head taller.`,
    ]) : V([
      `有仆人看见带${W1}的人和带${W2}的人在走廊擦肩而过——前者比后者高出一个头。`,
      `带${W1}的人与带${W2}的人曾一同下楼，带${W1}的那位明显高得多。`,
    ]);
    case 'xorSide': return en ? V([
      `The one carrying the ${W1} and the one carrying the ${W2} waved to each other through a window — one inside the main house, one outside.`,
    ]) : V([
      `带${W1}的人和带${W2}的人隔着窗户打过招呼——一个在主楼里，一个在主楼外。`,
      `门房确定：带${W1}的人与带${W2}的人，一个整晚在主楼内，另一个一直在主楼外。`,
    ]);
    case 'murdererMotive': return en ? {
      '钱': "The victim's ledger doesn't add up — the police conclude the killer was after money.",
      '情': 'Old letters reveal a tangled bond — this was a crime of passion.',
      '秘': "The victim held someone's secret — the killer struck to keep them silent.",
    }[cl.cat] : {
      '钱': '死者的账本上有几笔对不上的账——警方断定：凶手为的是钱财。',
      '情': '死者的旧信里翻出一段纠葛——警方断定：这是一桩情仇引发的命案。',
      '秘': '死者生前握着别人的把柄——警方断定：凶手杀人是为了灭口。',
    }[cl.cat];
    case 'countS': {
      const noun = en
        ? { height: 'tall guest(s)', glasses: 'glasses-wearer(s)', hair: 'silver-haired guest(s)' }[cl.key]
        : { height: '高个子', glasses: '戴眼镜的', hair: '银白头发的' }[cl.key];
      if (en) return cl.cnt === 0
        ? `The doorkeeper watched the main house all night: not one ${noun.replace('(s)', '')} stayed inside.`
        : `The doorkeeper watched the main house all night: exactly ${cl.cnt} ${noun} stayed inside.`;
      return cl.cnt === 0
        ? `门房整晚守在主楼门口，记得很清楚：案发时留在主楼里的人当中，一个${noun}都没有。`
        : `门房整晚守在主楼门口，数得清清楚楚：案发时留在主楼里的人当中，恰好有${cl.cnt}位${noun}。`;
    }
    case 'countW': {
      if (en) return cl.cnt === 0
        ? 'The guard swept outside with a metal detector all night — not a single metal item was outside the main house.'
        : `The guard swept outside with a metal detector all night: exactly ${cl.cnt} metal item(s) were outside the main house.`;
      return cl.cnt === 0
        ? '保安带着金属探测器在主楼外巡了一整晚，一声都没响：主楼外没有一件金属物品。'
        : `保安带着金属探测器在主楼外巡了一整晚：主楼外的物品里，恰好有${cl.cnt}件是金属的。`;
    }
  }
  return '';
}

// ---------- 证词文案（显示时渲染） ----------
function testimonyText(c, t, lang) {
  if (t.text && t.vr === undefined) return t.text; // 旧版兼容
  const vr = t.vr || 0;
  const V = (arr) => arr[vr % arr.length];
  const en = lang === 'en';
  const L = t.l != null ? eN(c.locations[t.l], lang) : '';
  const W = t.w != null ? eN(c.weapons[t.w], lang) : '';
  const S2 = t.s2 != null ? eN(c.suspects[t.s2], lang) : '';
  switch (t.tt) {
    case 'claimLoc': return en ? V([
      `I was in the ${L} all night. Never left.`,
      `I was in the ${L} when it happened — go and check.`,
    ]) : V([
      `我整晚都待在${L}，哪儿也没去。`,
      `案发时我就在${L}，不信你们去查。`,
    ]);
    case 'denyLoc': return en ? V([
      `I've never set foot in the ${L}.`,
      `The ${L}? I don't even know which way its door opens.`,
    ]) : V([
      `我从没进过${L}。`,
      `${L}？我连门朝哪边开都不知道。`,
    ]);
    case 'denyW': return en ? V([
      `I never touched the ${W}.`,
      `The ${W} isn't mine — I never laid a finger on it.`,
    ]) : V([
      `我可从来没碰过${W}。`,
      `${W}不是我的，我提都没碰过它。`,
    ]);
    case 'seeOther': return en ? V([
      `I passed the ${L} and saw ${S2} inside with my own eyes.`,
      `${S2} was in the ${L} — I saw it plain as day.`,
    ]) : V([
      `我路过${L}时，亲眼看见${S2}在里面。`,
      `${S2}当时就在${L}，我看得真真的。`,
    ]);
  }
  return '';
}

// ---------- 案件包装文案 ----------
function caseTitle(c, lang) {
  if (c.title && c.venueIdx === undefined) return c.title; // 旧版兼容
  const v = VENUES[c.venueIdx];
  if (lang === 'en') return c.titleKind ? `Shadows over ${v.en}` : `The ${v.en.replace(/^the /, '')} Mystery`;
  return `${v.zh}${c.titleKind ? '疑云' : '谜案'}`;
}
function caseIntro(c, lang) {
  if (c.intro && c.introIdx === undefined) return c.intro; // 旧版兼容
  const t = TIMES[c.timeIdx], v = VICTIMS[c.victimIdx], ve = VENUES[c.venueIdx], n = c.n;

    const weapons = pickPool(rng, WEAPON_POOL, n, avoid.w);
    const locations = pickPool(rng, LOCATION_POOL, n, avoid.l);
    const wOf = shuffle(rng, [...Array(n).keys()]);
    const lOf = shuffle(rng, [...Array(n).keys()]);
    const murderLoc = Math.floor(rng() * n);
    const murderer = lOf.indexOf(murderLoc);
    const attrs = suspects.map(() => {
      const a = {};
      for (const key of ATTR_KEYS) a[key] = rng() < 0.5;
      return a;
    });
    const motives = shuffle(rng, MOTIVES).slice(0, n);
    // 证词：每人一句，只有凶手撒谎；始终参与推理
    const testimonies = suspects.map((_, s) => makeTestimony(rng, s, n, murderer, murderLoc, wOf, lOf));
    const testiClues = testimonies.map(t => ({ ...t, k: 'testimony', ml: murderLoc }));
    const cands = buildCandidates(rng, n, wOf, lOf, suspects, weapons, locations, attrs, motives, murderer, murderLoc, diff.allowDirect);
    // 播种：先放入若干关联型线索，让谜题必须交叉推理
    const relCands = shuffle(rng, cands.filter(c => REL_KINDS.has(c.k)));
    const chosen = relCands.slice(0, diff.relSeeds);
    const withT = (arr) => [...testiClues, ...arr];
    let ordered = shuffle(rng, cands.filter(c => !chosen.includes(c)));
    if (diff.indirectFirst) ordered.sort((a, b) => a.tier - b.tier || 0);
    let directUsed = 0;
    let score = progressScore(withT(chosen), n);
    if (score < 0) continue;
    for (const c of ordered) {
      if (c.tier === 3 && directUsed >= diff.maxDirect) continue;
      const sc = progressScore(withT([...chosen, c]), n);
      if (sc > score) {
        chosen.push(c);
        if (c.tier === 3) directUsed++;
        score = sc;
        if (solvableByDeduction(withT(chosen), n)) break;
      }
    }
    if (!solvableByDeduction(withT(chosen), n)) continue;
    // 删减冗余：先试删直白线索（tier 高者），关联型最后删
    for (let pass = 0; pass < 3; pass++) {
      let removed = false;
      const order = [...chosen].sort((a, b) => b.tier - a.tier);
      for (const c of order) {
        const idx = chosen.indexOf(c);
        if (idx === -1) continue;
        const rest = chosen.filter((_, i) => i !== idx);
        if (solvableByDeduction(withT(rest), n)) { chosen.splice(idx, 1); removed = true; }
      }
      if (!removed) break;
    }
    if (chosen.filter(c => REL_KINDS.has(c.k)).length < diff.minRel) continue;
    return {
      seed, diffId: diff.id, n,
      suspects, weapons, locations, attrs, motives, testimonies,
      wOf, lOf, murderer, murderLoc,
      clues: shuffle(rng, chosen).map(c => ({ k: c.k, s: c.s, w: c.w, l: c.l, key: c.key, val: c.val, wkey: c.wkey, inMain: c.inMain, s1: c.s1, s2: c.s2, l1: c.l1, l2: c.l2, w1: c.w1, w2: c.w2, ml: c.ml, cat: c.cat, cnt: c.cnt, side: c.side, vr: c.vr })),
      victimIdx: Math.floor(rng() * VICTIMS.length),
      venueIdx: Math.floor(rng() * VENUES.length),
      timeIdx: Math.floor(rng() * TIMES.length),
      introIdx: Math.floor(rng() * 3),
      titleKind: rng() < 0.5 ? 0 : 1,
    };
  }
  return null;
}
function hydrateClues(c) {
  return c.clues.map(cl => ({ ...cl, attrs: c.attrs, weapons: c.weapons, locations: c.locations, motives: c.motives }));
}
// 全部推理素材 = 证词 + 线索（求解校验用）
function allClues(c) {
  const t = (c.testimonies || []).map(x => ({ ...x, k: 'testimony', ml: c.murderLoc }));
  return [...t, ...hydrateClues(c)];
}
function solutionGrids(c) {
  const n = c.n;
  const grids = makeGrids(n);
  for (let s = 0; s < n; s++) {
    for (let w = 0; w < n; w++) grids.SW[s][w] = c.wOf[s] === w ? 2 : 1;
    for (let l = 0; l < n; l++) grids.SL[s][l] = c.lOf[s] === l ? 2 : 1;
  }
  for (let s = 0; s < n; s++) for (let w = 0; w < n; w++) for (let l = 0; l < n; l++) {
    if (c.wOf[s] === w && c.lOf[s] === l) grids.WL[w][l] = 2;
  }
  for (let w = 0; w < n; w++) for (let l = 0; l < n; l++) if (grids.WL[w][l] !== 2) grids.WL[w][l] = 1;
  return grids;
}

// ---------- 可解释提示（双语） ----------
// 返回 { g, r, c, v, why, fix? }；网格已推满时返回 null
function nextHint(c, marks, lang) {
  const en = lang === 'en';
  const n = c.n;
  const sol = solutionGrids(c);
  const GK = ['SW', 'SL', 'WL'];
  for (const g of GK) for (let r = 0; r < n; r++) for (let cc = 0; cc < n; cc++) {
    const u = marks[g][r][cc];
    if (u !== 0 && u !== sol[g][r][cc]) {
      return { fix: true, g, r, c: cc, v: sol[g][r][cc], why: en
        ? 'This mark contradicts the facts — I have corrected it. Re-check the related clues to see where the reasoning slipped.'
        : '网格上这个标记与事实矛盾——已帮你改正。回头核对一下相关线索，看看是哪一步推岔了。' };
    }
  }
  const mkGrids = () => ({ SW: marks.SW.map(x => x.slice()), SL: marks.SL.map(x => x.slice()), WL: marks.WL.map(x => x.slice()) });
  const firstNew = (probe) => {
    for (const g of GK) for (let r = 0; r < n; r++) for (let cc = 0; cc < n; cc++) {
      if (marks[g][r][cc] === 0 && probe[g][r][cc] !== 0) return { g, r, c: cc, v: probe[g][r][cc] };
    }
    return null;
  };
  const sn = (i) => eN(c.suspects[i], lang), wn = (i) => eN(c.weapons[i], lang), ln = (i) => eN(c.locations[i], lang);
  const rowName = (g, i) => (g === 'WL' ? wn(i) : sn(i));
  const colName = (g, i) => (g === 'SW' ? wn(i) : ln(i));
  // ① 线索直接推理
  const hydrated = hydrateClues(c);
  for (let i = 0; i < hydrated.length; i++) {
    const probe = mkGrids();
    if (clueInfer(probe, hydrated[i], n) > 0) {
      const m = firstNew(probe);
      if (m) {
        const txt = clueText(c, c.clues[i], lang);
        const nn = String(i + 1).padStart(2, '0');
        return { ...m, why: en
          ? `By clue ${nn} — "${txt}" — you can ${m.v === 2 ? 'confirm' : 'rule out'} "${rowName(m.g, m.r)} × ${colName(m.g, m.c)}".`
          : `依据线索 ${nn}「${txt}」——可以${m.v === 2 ? '确认' : '排除'}「${rowName(m.g, m.r)} × ${colName(m.g, m.c)}」。` };
      }
    }
  }
  // ② 证词推理
  const testi = (c.testimonies || []).map(t => ({ ...t, k: 'testimony', ml: c.murderLoc }));
  for (const t of testi) {
    const probe = mkGrids();
    if (clueInfer(probe, t, n) > 0) {
      const m = firstNew(probe);
      if (m) {
        const S = sn(t.s), ml = c.murderLoc;
        const txt = testimonyText(c, t, lang);
        let why;
        if (marks.SL[t.s][ml] === 1) why = en
          ? `${S} is proven innocent (not at the crime scene) — their testimony "${txt}" must be true. Use it as fact.`
          : `${S}已被证实不在案发现场，是清白的——TA的证词「${txt}」句句属实，可以直接当事实用。`;
        else if (marks.SL[t.s][ml] === 2) why = en
          ? `${S} is confirmed at the crime scene — they are the killer, so their testimony "${txt}" must be a lie. Flip it.`
          : `${S}已被锁定在案发现场——TA就是凶手，证词「${txt}」必是谎言，把它反过来用。`;
        else if (m.g === 'SL' && m.r === t.s && m.c === ml && m.v === 2) why = en
          ? `${S}'s testimony "${txt}" contradicts the proven facts — only the killer lies. They must be at the crime scene!`
          : `${S}的证词「${txt}」与网格上已证实的事实矛盾——只有凶手才撒谎，TA一定就在案发现场！`;
        else why = en
          ? `${S}'s testimony "${txt}" has been verified as true — truth-tellers aren't the killer. Rule them out of the crime scene.`
          : `${S}的证词「${txt}」已被事实印证为真——说真话的不是凶手，可以排除TA在案发现场。`;
        return { ...m, why };
      }
    }
  }
  // ③ 基本规则
  for (const g of GK) {
    const M = marks[g];
    for (let r = 0; r < n; r++) for (let cc = 0; cc < n; cc++) {
      if (M[r][cc] !== 2) continue;
      for (let c2 = 0; c2 < n; c2++) if (c2 !== cc && M[r][c2] === 0) {
        return { g, r, c: c2, v: 1, why: en
          ? `"${rowName(g, r)}" is already paired with "${colName(g, cc)}" — one each, no repeats, so the rest of this row can be ruled out.`
          : `「${rowName(g, r)}」已和「${colName(g, cc)}」配对——一人一物一地互不重复，同一行的其余组合都可排除。` };
      }
      for (let r2 = 0; r2 < n; r2++) if (r2 !== r && M[r2][cc] === 0) {
        return { g, r: r2, c: cc, v: 1, why: en
          ? `"${colName(g, cc)}" already belongs to "${rowName(g, r)}" — the rest of this column can be ruled out.`
          : `「${colName(g, cc)}」已归属「${rowName(g, r)}」——同一列的其他组合都可排除。` };
      }
    }
    for (let r = 0; r < n; r++) {
      let unk = -1, cnt = 0, hasYes = false;
      for (let cc = 0; cc < n; cc++) { if (M[r][cc] === 0) { unk = cc; cnt++; } if (M[r][cc] === 2) hasYes = true; }
      if (!hasYes && cnt === 1) return { g, r, c: unk, v: 2, why: en
        ? `Every other option for "${rowName(g, r)}" is ruled out — only "${colName(g, unk)}" remains. It must be true: mark ✓.`
        : `「${rowName(g, r)}」的其他可能都被排除了——只剩「${colName(g, unk)}」这一格，必然成立，画 ✓。` };
    }
    for (let cc = 0; cc < n; cc++) {
      let unk = -1, cnt = 0, hasYes = false;
      for (let r = 0; r < n; r++) { if (M[r][cc] === 0) { unk = r; cnt++; } if (M[r][cc] === 2) hasYes = true; }
      if (!hasYes && cnt === 1) return { g, r: unk, c: cc, v: 2, why: en
        ? `"${colName(g, cc)}" has only one possibility left — "${rowName(g, unk)}". It must be true: mark ✓.`
        : `「${colName(g, cc)}」只剩「${rowName(g, unk)}」一个可能——必然成立，画 ✓。` };
    }
  }
  // ④ 交叉推理
  const { SW, SL, WL } = marks;
  for (let s = 0; s < n; s++) for (let w = 0; w < n; w++) for (let l = 0; l < n; l++) {
    const a = SW[s][w], b = SL[s][l], k = WL[w][l];
    if (a === 2 && b === 2 && k === 0) return { g: 'WL', r: w, c: l, v: 2, why: en
      ? `Cross-inference: ${sn(s)} carries the ${wn(w)}, and ${sn(s)} is in the ${ln(l)} — so the ${wn(w)} is in the ${ln(l)}.`
      : `交叉推理：${sn(s)}带着${wn(w)}，而${sn(s)}在${ln(l)}——所以${wn(w)}就在${ln(l)}。` };
    if (a === 2 && k === 2 && b === 0) return { g: 'SL', r: s, c: l, v: 2, why: en
      ? `Cross-inference: ${sn(s)} carries the ${wn(w)}, and the ${wn(w)} is in the ${ln(l)} — so ${sn(s)} is in the ${ln(l)}.`
      : `交叉推理：${sn(s)}带着${wn(w)}，而${wn(w)}在${ln(l)}——所以${sn(s)}就在${ln(l)}。` };
    if (b === 2 && k === 2 && a === 0) return { g: 'SW', r: s, c: w, v: 2, why: en
      ? `Cross-inference: ${sn(s)} is in the ${ln(l)}, and the item there is the ${wn(w)} — so ${sn(s)} carries the ${wn(w)}.`
      : `交叉推理：${sn(s)}在${ln(l)}，而${ln(l)}里的物品是${wn(w)}——所以${sn(s)}带的就是${wn(w)}。` };
    if (a === 2 && b === 1 && k === 0) return { g: 'WL', r: w, c: l, v: 1, why: en
      ? `Cross-inference: ${sn(s)} carries the ${wn(w)}, but ${sn(s)} is not in the ${ln(l)} — so the ${wn(w)} cannot be in the ${ln(l)}.`
      : `交叉推理：${sn(s)}带着${wn(w)}，但${sn(s)}不在${ln(l)}——所以${wn(w)}不会出现在${ln(l)}。` };
    if (a === 2 && k === 1 && b === 0) return { g: 'SL', r: s, c: l, v: 1, why: en
      ? `Cross-inference: ${sn(s)} carries the ${wn(w)}, but the ${wn(w)} is not in the ${ln(l)} — so ${sn(s)} is not in the ${ln(l)}.`
      : `交叉推理：${sn(s)}带着${wn(w)}，但${wn(w)}不在${ln(l)}——所以${sn(s)}也不在${ln(l)}。` };
    if (b === 2 && a === 1 && k === 0) return { g: 'WL', r: w, c: l, v: 1, why: en
      ? `Cross-inference: the person in the ${ln(l)} is ${sn(s)}, but ${sn(s)} doesn't carry the ${wn(w)} — so the item in the ${ln(l)} isn't the ${wn(w)}.`
      : `交叉推理：${ln(l)}里的人是${sn(s)}，但${sn(s)}没带${wn(w)}——所以${ln(l)}里的物品不是${wn(w)}。` };
    if (b === 2 && k === 1 && a === 0) return { g: 'SW', r: s, c: w, v: 1, why: en
      ? `Cross-inference: ${sn(s)} is in the ${ln(l)}, but the item there isn't the ${wn(w)} — so ${sn(s)} doesn't carry the ${wn(w)}.`
      : `交叉推理：${sn(s)}在${ln(l)}，但${ln(l)}里的物品不是${wn(w)}——所以${sn(s)}带的不是${wn(w)}。` };
    if (k === 2 && a === 1 && b === 0) return { g: 'SL', r: s, c: l, v: 1, why: en
      ? `Cross-inference: the item in the ${ln(l)} is the ${wn(w)}, but ${sn(s)} doesn't carry it — so ${sn(s)} is not in the ${ln(l)}.`
      : `交叉推理：${ln(l)}里的物品是${wn(w)}，但${wn(w)}不是${sn(s)}带的——所以${sn(s)}不在${ln(l)}。` };
    if (k === 2 && b === 1 && a === 0) return { g: 'SW', r: s, c: w, v: 1, why: en
      ? `Cross-inference: the ${wn(w)} is in the ${ln(l)}, but ${sn(s)} is not — so the ${wn(w)} isn't ${sn(s)}'s.`
      : `交叉推理：${wn(w)}在${ln(l)}，但${sn(s)}不在${ln(l)}——所以${wn(w)}不是${sn(s)}带的。` };
  }
  return null; // 网格已推满
}

const BASE_SCORE = { novice: 100, expert: 250, master: 500 };
const PAR_SECS = { novice: 300, expert: 600, master: 900 }; // 用时基准
function gradeOf(ratio) { return ratio >= 1.5 ? 'S' : ratio >= 1.2 ? 'A' : ratio >= 0.9 ? 'B' : ratio >= 0.5 ? 'C' : 'D'; }

// 计分：基础分 ×(1-提示扣分) ×(1+用时加成) ×(1+连胜加成) ×(1+首次命中)，地板为基础分 10%
function computeScore(isReplay) {
  const c = G.case;
  const base = BASE_SCORE[c.diffId] || 100;
  const hintsUsed = 3 - G.hintsLeft;
  const hintPenalty = Math.min(0.25 * hintsUsed, 0.9);
  const secs = Math.max(1, Math.round((Date.now() - G.startedAt) / 1000));
  const par = PAR_SECS[c.diffId] || 300;
  const timeBonus = secs <= par * 0.5 ? 0.2 : secs <= par ? 0.1 : 0;
  const streakBonus = isReplay ? 0 : 0.05 * Math.min(stats.streak + 1, 10); // 含本场的新连胜
  const oneShot = G.attempts === 1 ? 0.3 : 0;
  let score = base * (1 - hintPenalty) * (1 + timeBonus) * (1 + streakBonus) * (1 + oneShot);
  score = Math.max(base * 0.1, score);
  const grade = gradeOf(score / base);
  return { base, hintsUsed, hintPenalty, secs, timeBonus, streakBonus, oneShot, score: Math.round(score), grade };
}

function checkTitles() {
  const news = [];
  for (const t of TITLES) {
    if (!stats.titles.includes(t.id) && t.get(stats) >= t.target) {
      stats.titles.push(t.id);

// 卷宗记录（COLD 状态额外存整个案件数据，供"重启调查"复现）
function makeRecord(status, res) {
  const c = G.case;
  const la = G.lastAccuse;
  const LG = LNG();
  return {
    id: `${c.seed}-${G.startedAt}`,
    title: ENGINE.caseTitle(c, LG), diffId: c.diffId, date: Date.now(),
    culprit: `${c.suspects[c.murderer].emoji} ${ENGINE.eN(c.suspects[c.murderer], LG)}`,
    weapon: `${c.weapons[c.wOf[c.murderer]].emoji} ${ENGINE.eN(c.weapons[c.wOf[c.murderer]], LG)}`,
    location: `${c.locations[c.murderLoc].emoji} ${ENGINE.eN(c.locations[c.murderLoc], LG)}`,
    score: res ? res.score : 0,
    grade: res ? res.grade : null,
    hintsUsed: 3 - G.hintsLeft,
    attempts: G.attempts,
    timeSec: res ? res.secs : Math.max(1, Math.round((Date.now() - G.startedAt) / 1000)),
    status,
    accusation: la ? `${c.suspects[la.s].emoji} ${ENGINE.eN(c.suspects[la.s], LG)}` : null,
    caseData: status === 'COLD' ? c : undefined,
  };
}

function scoreRowsHTML(res, finalScore, isReplay) {
  const rows = [];

  rows.push([tt('用时加成', 'Speed bonus'), res.timeBonus ? `+${Math.round(res.timeBonus * 100)}%` : '—']);
  if (!isReplay) rows.push([tt('连胜加成', 'Streak bonus'), res.streakBonus ? `+${Math.round(res.streakBonus * 100)}%` : '—']);
  rows.push([tt('首次命中', 'First-try hit'), res.oneShot ? '+30%' : '—']);
  if (isReplay) rows.push([tt('冷案平反', 'Cold case'), tt('得分 ×50%', 'score ×50%')]);
  let html = rows.map(([k, v], i) => `<div class="row" style="animation-delay:${(0.15 + i * 0.22).toFixed(2)}s"><span>${k}</span><span>${v}</span></div>`).join('');
  html += `<div class="row total" style="animation-delay:${(0.15 + rows.length * 0.22).toFixed(2)}s"><span>${tt('最终得分', 'Final score')}</span><span>${finalScore}<span class="grade-badge g-${res.grade}">${res.grade}</span></span></div>`;

// ---------- 存档码备份 ----------
// 托管环境（沙箱 iframe / iOS 主屏幕容器）可能不长期保留 localStorage，
// 存档码是跨设备、跨环境的可靠备份手段。
function exportSave() {
  let game = null;
  if (G) { const { undoStack, ...rest } = G; game = rest; }
  const data = { v: 1, t: Date.now(), stats, pref, archive, game };
  return 'MMS1.' + btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}
function importSave(code) {
  let d;
  try {
    const raw = String(code || '').replace(/\s+/g, '');
    if (!raw.startsWith('MMS1.')) return tt('存档码应以 MMS1. 开头——请确认复制完整。', 'A save code starts with MMS1. — please copy it in full.');
    d = JSON.parse(decodeURIComponent(escape(atob(raw.slice(5)))));
  } catch (e) { return tt('存档码解析失败——请确认完整粘贴，中间不能缺字。', 'Could not parse the save code — make sure it was pasted completely.'); }
  if (!d || !d.stats) return tt('存档码内容无法识别。', 'Unrecognized save code contents.');
  stats = { ...STAT_DEFAULTS, ...d.stats };
  if (!Array.isArray(stats.titles)) stats.titles = [];
  if (!Array.isArray(stats.licenses)) stats.licenses = [];
  pref = { ...PREF_DEFAULTS, ...d.pref };
  archive = { solved: [], cold: [], ...(d.archive || {}) };
  if (!Array.isArray(archive.solved)) archive.solved = [];
  if (!Array.isArray(archive.cold)) archive.cold = [];
  G = d.game && d.game.case && d.game.marks ? { ...d.game, undoStack: [] } : null;
  save(LS_STATS, stats);
  save(LS_PREF, pref);
  saveArchive();
  saveGame();
  return null;
}
function showBackup() {

  openModal(`

    const legacy = () => { box.select(); box.setSelectionRange(0, box.value.length); document.execCommand('copy'); done(); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(box.value).then(done).catch(legacy);
    } else legacy();
  });
  document.getElementById('impBtn').addEventListener('click', () => {
    const codeIn = document.getElementById('impBox').value;
    if (!codeIn.trim()) return;
    confirmModal(tt('导入将覆盖当前的战绩、卷宗和进行中的案件，确定吗？', 'Importing will overwrite your stats, archive and current case. Continue?'), () => {

    });
  });
}

function startCase(diffId, tweak) {
  tutEnd();
  // 避开最近两案出现过的人物/凶器/地点，缓解重复感
  const recent = pref.recent || { s: [], w: [], l: [] };
  const c = ENGINE.generateCase(diffId, (Date.now() ^ (Math.random() * 0xffffffff)) >>> 0, recent, tweak);
  if (!c) { alert('案卷生成失败，请再试一次'); return; }
  pref.recent = {
    s: [...c.suspects.map(x => x.name), ...recent.s].slice(0, 10),
    w: [...c.weapons.map(x => x.name), ...recent.w].slice(0, 10),
    l: [...c.locations.map(x => x.name), ...recent.l].slice(0, 8),
  };
  save(LS_PREF, pref);
  const n = c.n;
  const empty = () => Array.from({ length: n }, () => new Array(n).fill(0));
  G = {
    case: c,
    marks: { SW: empty(), SL: empty(), WL: empty() },
    hinted: [],
    struck: new Array(c.clues.length).fill(false),
    hintsLeft: 3,
    attempts: 0,
    startedAt: Date.now(),
    undoStack: [],
  };
  saveGame();
  renderCase();
}

// L 形网格：列 = 凶器 + 地点；行 = 嫌疑人 + 地点（地点行只对凶器列）
function renderGrid() {
  const c = G.case, n = c.n;
  const grid = document.getElementById('lgrid');
  if (!grid) return;
  const avail = Math.min(560, window.innerWidth) - 28 - 24 - 4; // wrap + sec padding + borders
  const label = n >= 5 ? 66 : 78;
  const cell = Math.max(22, Math.min(38, Math.floor((avail - label - (2 * n + 1) * 2) / (2 * n))));
  grid.style.gridTemplateColumns = `${label}px repeat(${2 * n}, ${cell}px)`;
  grid.style.setProperty('--cell', cell + 'px');

  let html = `<div class="corner">${tt('✓ 确认<br>✕ 排除', '✓ yes<br>✕ no')}</div>`;
  for (const w of c.weapons) html += `<div class="gh"><span class="h-emoji">${w.emoji}</span><span class="h-name">${esc(ENGINE.eN(w, LNG()))}</span></div>`;
  for (const l of c.locations) html += `<div class="gh ${'gsep-l'}"><span class="h-emoji">${l.emoji}</span><span class="h-name">${esc(ENGINE.eN(l, LNG()))}</span></div>`;
  // actually only first location header needs the separator; fix below via nth-child styling inline
  for (let s = 0; s < n; s++) {
    const sp = c.suspects[s];
    html += `<div class="gl"><span class="l-emoji">${sp.emoji}</span><span class="l-name">${esc(ENGINE.eN(sp, LNG()))}</span></div>`;
    for (let w = 0; w < n; w++) html += cellBtn('SW', s, w, '');
    for (let l = 0; l < n; l++) html += cellBtn('SL', s, l, l === 0 ? 'gsep-l' : '');
  }
  for (let l = 0; l < n; l++) {
    const lo = c.locations[l];
    const sepT = l === 0 ? 'gsep-t' : '';
    html += `<div class="gl ${sepT}"><span class="l-emoji">${lo.emoji}</span><span class="l-name">${esc(ENGINE.eN(lo, LNG()))}</span></div>`;
    for (let w = 0; w < n; w++) html += cellBtn('WL', w, l, sepT);
    if (l === 0) html += `<div class="dead gsep-l gsep-t" style="grid-column: span ${n}; grid-row: span ${n};"></div>`;
  }
  grid.innerHTML = html;
  // remove stray separator classes on non-first location headers
  const headers = grid.querySelectorAll('.gh');
  headers.forEach((h, idx) => { if (idx !== n) h.classList.remove('gsep-l'); });
  grid.querySelectorAll('.cell').forEach(el => el.addEventListener('click', () => onCellTap(el)));
  // 教学引导中重绘网格后，恢复目标格高亮
  if (TUT.active && TUT.target) {
    const t = TUT.target;
    const cell = grid.querySelector(`.cell[data-g="${t.g}"][data-r="${t.r}"][data-c="${t.c}"]`);
    if (cell) cell.classList.add('tut');
  }
}
function cellBtn(g, r, cIdx, extra) {
  const v = G.marks[g][r][cIdx];
  const hinted = G.hinted.includes(`${g}:${r}:${cIdx}`) ? ' hinted' : '';
  const cls = v === 1 ? 'no' : v === 2 ? 'yes' : '';
  const glyph = v === 1 ? '✕' : v === 2 ? '✓' : '';
  return `<button class="cell ${cls} ${extra}${hinted}" data-g="${g}" data-r="${r}" data-c="${cIdx}" aria-label="${g} ${r + 1}-${cIdx + 1}">${glyph}</button>`;
}
function onCellTap(el) {
  const g = el.dataset.g, r = +el.dataset.r, cIdx = +el.dataset.c;
  // 教学引导中：只响应闪烁的目标格，且直接落下正确标记
  if (TUT.active && TUT.target) {
    const t = TUT.target;
    if (g === t.g && r === t.r && cIdx === t.c) {
      pushUndo();
      G.marks[g][r][cIdx] = t.v;
      if (t.v === 2) autoCross(g, r, cIdx);
      playSfx('tap', t.v);
      saveGame();
      renderGrid();
      TUT.guided++;
      TUT.target = null;
      tutShow();
    }
    return;
  }
  pushUndo();
  const cur = G.marks[g][r][cIdx];
  const next = (cur + 1) % 3;
  G.marks[g][r][cIdx] = next;
  if (next === 2) autoCross(g, r, cIdx);
  playSfx('tap', next);
  saveGame();
  renderGrid();
}
function autoCross(g, r, cIdx) {
  const n = G.case.n, M = G.marks[g];
  for (let c2 = 0; c2 < n; c2++) if (c2 !== cIdx && M[r][c2] === 0) M[r][c2] = 1;
  for (let r2 = 0; r2 < n; r2++) if (r2 !== r && M[r2][cIdx] === 0) M[r2][cIdx] = 1;
}
function pushUndo() {
  G.undoStack.push(JSON.stringify({ marks: G.marks, hinted: G.hinted }));
  if (G.undoStack.length > 40) G.undoStack.shift();
}
function undo() {
  const snap = G.undoStack.pop();
  if (!snap) return;
  const parsed = JSON.parse(snap);
  G.marks = parsed.marks;
  G.hinted = parsed.hinted;
  saveGame();
  renderGrid();
}

function useHint() {
  if (G.exam) { toastModal(tt('考核规则', 'Exam Rules'), tt('晋升考核中禁用提示——全凭真本事，侦探。', 'Hints are disabled during the promotion exam — it is all on you, detective.')); return; }
  if (G.hintsLeft <= 0) { toastModal(tt('提示已用完', 'No Hints Left'), tt('本案的 3 次提示都用掉了，接下来只能靠自己推理了，侦探。', 'All 3 hints are spent — from here on, it is pure deduction.')); return; }
  // 可解释提示：给出下一步 + 推理依据
  const h = ENGINE.nextHint(G.case, G.marks, LNG());
  if (!h) { toastModal(tt('网格已完成', 'Grid Complete'), tt('所有关系都已推理正确——去提出指控吧！', 'Every relation is correctly deduced — go make your accusation!')); return; }
  pushUndo();
  G.marks[h.g][h.r][h.c] = h.v;
  if (h.v === 2) autoCross(h.g, h.r, h.c);
  G.hinted.push(`${h.g}:${h.r}:${h.c}`);
  G.hintsLeft--;
  saveGame();
  renderGrid();
  flashCell(h.g, h.r, h.c);
  updateHintBtn();
  toastModal(h.fix ? tt('发现一处笔误', 'Found a Slip') : tt('推理提示', 'Deduction Hint'), h.why + (h.fix ? '' : tt('（已在网格上为你标出，虚线框标记。）', ' (Marked on the grid for you — dashed border.)')));
  if (TUT.active) tutShow(); // 教学中用了提示：刷新引导目标
}
function flashCell(g, r, cc) {
  const el = document.querySelector(`.cell[data-g="${g}"][data-r="${r}"][data-c="${cc}"]`);
  if (el) el.classList.add('flash');
}
function updateHintBtn() {

}

// ---------- 指控 ----------
let accusePick = { s: -1, w: -1, l: -1 };
function showAccuse() {
  const c = G.case;
  accusePick = { s: -1, w: -1, l: -1 };
  openModal(`
    <h2>${G.exam ? '⚖️ ' + tt('正式指控', 'Final Accusation') : tt('提出指控', 'Make Your Accusation')}</h2>

    <div class="pick-label">${tt('凶器是——', 'THE WEAPON IS —')}</div>
    <div class="chip-row">${c.weapons.map((w, i) => `<button class="chip" data-t="w" data-i="${i}">${w.emoji} ${esc(ENGINE.eN(w, LNG()))}</button>`).join('')}</div>
    <div class="pick-label">${tt('案发地点是——', 'THE SCENE IS —')}</div>
    <div class="chip-row">${c.locations.map((l, i) => `<button class="chip" data-t="l" data-i="${i}">${l.emoji} ${esc(ENGINE.eN(l, LNG()))}</button>`).join('')}</div>
    <div class="m-actions">
      <button class="btn" id="mNo">${tt('再想想', 'Think Again')}</button>
      <button class="btn primary" id="mGo" disabled>${tt('确认指控', 'ACCUSE')}</button>
    </div>
    ${!G.exam && G.attempts >= 2 ? `<div style="text-align:center;margin-top:8px"><button class="linkish" id="giveUp">${G.replay ? tt('调查陷入僵局，放弃本次重启', 'Stuck — abandon this re-investigation') : stats.shields > 0 ? tt('调查陷入僵局，查看真相（将消耗 1 枚护盾）', 'Stuck — reveal the truth (uses 1 shield)') : tt('调查陷入僵局，查看真相（连胜将清零）', 'Stuck — reveal the truth (streak resets)')}</button></div>` : ''}
  `);
  overlayEl.querySelectorAll('.chip').forEach(el => el.addEventListener('click', () => {
    const t = el.dataset.t, i = +el.dataset.i;
    accusePick[t] = i;
    overlayEl.querySelectorAll(`.chip[data-t="${t}"]`).forEach(x => x.classList.toggle('sel', x === el));
    document.getElementById('mGo').disabled = !(accusePick.s >= 0 && accusePick.w >= 0 && accusePick.l >= 0);

function doAccuse() {
  const c = G.case;
  const right = accusePick.s === c.murderer && accusePick.w === c.wOf[c.murderer] && accusePick.l === c.murderLoc;
  G.attempts++;
  // 晋升考核：一锤定音
  if (G.exam) {
    tutEnd();
    if (right) examPass();
    else examFail(tt('指控错误——真凶从你眼皮底下溜走了。', 'Wrong accusation — the true culprit slipped right past you.'));
    return;
  }
  if (right) {
    tutEnd();
    const isReplay = !!G.replay;
    const res = computeScore(isReplay);
    const finalScore = isReplay ? Math.round(res.score / 2) : res.score; // 平反得 50%
    const perfect = !isReplay && G.attempts === 1 && G.hintsLeft === 3;
    let shieldGained = false;
    if (isReplay) {
      stats.solved++;
      stats.exonerated++;
      stats.totalScore += finalScore;
      const idx = archive.cold.findIndex(r => r.id === G.replay);
      if (idx >= 0) {
        const rec = archive.cold.splice(idx, 1)[0];
        rec.status = 'EXONERATED';
        rec.score = finalScore; rec.grade = res.grade;
        rec.hintsUsed = res.hintsUsed; rec.attempts = G.attempts;
        rec.timeSec = res.secs; rec.date = Date.now();
        delete rec.caseData;
        archive.solved.unshift(rec);
      }
    } else {
      stats.solved++;
      stats.streak++;
      stats.best = Math.max(stats.best, stats.streak);
      if (perfect) stats.perfect++;
      stats.totalScore += finalScore;
      if (G.attempts === 1) stats.oneShotWins++;
      if (res.grade === 'S') stats.sCount++;
      if (c.diffId === 'master') stats.masterNoHint = res.hintsUsed === 0 ? stats.masterNoHint + 1 : 0;
      if (c.diffId !== 'novice' && res.secs <= 300) stats.fastWins++;
      stats.winsToShield++;
      if (stats.winsToShield >= 10) { // 每 10 次破案获得 1 枚护盾（上限 3）
        stats.winsToShield = 0;
        if (stats.shields < 3) { stats.shields++; shieldGained = true; }
      }
      archive.solved.unshift(makeRecord('SOLVED', { ...res, score: finalScore }));
      if (archive.solved.length > 200) archive.solved.length = 200;
    }
    // 段位进度（防刷：低于段位主难度的案件减半）
    let progressGain = 0, progressReduced = false;
    if (stats.rank < RANK_LADDER.length - 1) {
      progressReduced = DIFF_ORDER[c.diffId] < DIFF_ORDER[HOME_DIFF[stats.rank]];
      progressGain = progressReduced ? Math.round(finalScore / 2) : finalScore;
      stats.rankProgress += progressGain;
    }
    if (!isReplay && stats.examCooldown > 0) stats.examCooldown--; // 破案推进重考冷却
    const unlocked = checkTitles();
    saveArchive();
    save(LS_STATS, stats);
    const truth = truthHTML(c);
    const breakdown = scoreRowsHTML(res, finalScore, isReplay);
    const badges = [];
    if (perfect) badges.push(tt('⭐ 完美破案', '⭐ Perfect Solve'));

function truthHTML(c) {
  const LG = LNG();
  const m = c.suspects[c.murderer], w = c.weapons[c.wOf[c.murderer]], l = c.locations[c.murderLoc];
  const mN = esc(ENGINE.eN(m, LG)), wN = esc(ENGINE.eN(w, LG)), lN = esc(ENGINE.eN(l, LG));
  const lie = c.testimonies && c.testimonies[c.murderer]
    ? `<div class="truth" style="margin-top:6px">🎭 ${tt(`${m.emoji} ${mN}的证词「${esc(ENGINE.testimonyText(c, c.testimonies[c.murderer], LG))}」是彻头彻尾的谎言。`, `${m.emoji} ${mN}'s testimony — "${esc(ENGINE.testimonyText(c, c.testimonies[c.murderer], LG))}" — was a lie through and through.`)}</div>` : '';
  return `<div class="truth">${tt(`凶手是 <b>${m.emoji} ${mN}</b>，在 <b>${l.emoji} ${lN}</b> 用 <b>${w.emoji} ${wN}</b> 犯下了罪行。`, `The killer is <b>${m.emoji} ${mN}</b> — struck in the <b>${l.emoji} ${lN}</b> with the <b>${w.emoji} ${wN}</b>.`)}</div>${lie}`;
}
function revealTruth() {
  tutEnd();
  const c = G.case;
  const isReplay = !!G.replay;
  const secs = Math.max(1, Math.round((Date.now() - G.startedAt) / 1000));
  // 失败复盘：最后一次指控的对错拆解
  let review = '';
  if (G.lastAccuse) {
    const la = G.lastAccuse;
    const mk = (ok) => (ok ? `<b style="color:var(--seal)">${tt('对了', 'right')}</b>` : tt('错了', 'wrong'));
    const laName = esc(ENGINE.eN(c.suspects[la.s], LNG()));
    review = `<div class="truth" style="margin-top:6px">${tt(`复盘：你最后指控 <b>${c.suspects[la.s].emoji} ${laName}</b>——凶手${mk(la.s === c.murderer)}、凶器${mk(la.w === c.wOf[c.murderer])}、地点${mk(la.l === c.murderLoc)}。`, `Review: your last accusation was <b>${c.suspects[la.s].emoji} ${laName}</b> — killer ${mk(la.s === c.murderer)}, weapon ${mk(la.w === c.wOf[c.murderer])}, scene ${mk(la.l === c.murderLoc)}.`)}</div>`;
  }
  let noteHTML = '';
  if (isReplay) {
    // 冷案重启失败：不动连胜、不计失败，冷案原样保留可再来
    noteHTML = `<p style="font-size:13px;color:var(--ink-soft);text-align:center">${tt('这桩悬案仍未解开——它还躺在冷案库里，随时可以再启。', 'This case remains cold — it stays in the archive, ready whenever you are.')}</p>`;
  } else {
    let shieldUsed = false;
    if (stats.shields > 0) { stats.shields--; shieldUsed = true; } // 护盾吸收本次失败
    else stats.streak = 0;
    stats.failed++;
    const rec = makeRecord('COLD', null);
    rec.timeSec = secs;
    archive.cold.unshift(rec);
    if (archive.cold.length > 30) archive.cold.length = 30;
    saveArchive();
    save(LS_STATS, stats);
    noteHTML = `<p style="font-size:13px;color:var(--ink-soft);text-align:center">${shieldUsed ? tt('🛡️ 护盾碎裂，替你保住了连胜。', '🛡️ A shield shattered and saved your streak. ') : tt('连胜已清零。', 'Your streak has reset. ')}${tt('案件已存入冷案库——重启调查成功即可「平反」。', 'The case is filed as cold — reopen and solve it to earn an Exoneration.')}</p>`;
  }
  G = null;
  saveGame();
  openModal(`
    <div class="stamp-wrap"><span class="stamp grey">${tt('悬案', 'COLD CASE')}</span></div>
    <h2 style="text-align:center">${tt('真相封存于档案', 'The Truth Goes Into the Files')}</h2>
    ${truthHTML(c)}
    ${review}
    ${noteHTML}
    <div class="m-actions">
      <button class="btn" id="mArch">${tt('去冷案库', 'Cold Cases')}</button>
      <button class="btn primary" id="mNext">${tt('下一案', 'Next Case')}</button>
    </div>`);
  document.getElementById('mArch').addEventListener('click', () => { closeModal(); archTab = 'cold'; renderArchive(); });
  document.getElementById('mNext').addEventListener('click', () => { closeModal(); startCase(pref.diff); });
  setTimeout(() => playSfx('stamp', false), 250); // 悬案轻章
  setTimeout(() => playSfx('fail'), 520);         // 叹息乐句
}

function startColdCase(id) {
  const rec = archive.cold.find(r => r.id === id);
  if (!rec || !rec.caseData) return;
  const doStart = () => {
    tutEnd();
    const c = rec.caseData, n = c.n;
    const empty = () => Array.from({ length: n }, () => new Array(n).fill(0));
    G = {
      case: c,
      marks: { SW: empty(), SL: empty(), WL: empty() },
      hinted: [],
      struck: new Array(c.clues.length).fill(false),
      hintsLeft: 3, attempts: 0, startedAt: Date.now(), undoStack: [],
      replay: rec.id,
    };
    saveGame();
    renderCase();
  };
  if (G) confirmModal(tt('重启这桩冷案将放弃当前进行中的案件，确定吗？', 'Reopening this cold case will discard the case in progress. Continue?'), doStart);
  else doStart();
}

function tutEnd() {

function tutStart() {
  pref.seenHowto = true;

    // 教学专用超简单配置：不放关联线索、允许更多直白线索
    startCase('novice', { relSeeds: 0, minRel: 0, allowDirect: true, maxDirect: 2, indirectFirst: false });
    TUT = { active: true, step: 0, guided: 0, target: null };
    tutShow();
  };

function tutShow() {
  if (!TUT.active) return;
  document.body.classList.add('tut-on');
  let p = document.getElementById('tutPanel');
  if (!p) {
    p = document.createElement('div');
    p.id = 'tutPanel';
    p.className = 'tut-panel';
    document.body.appendChild(p);
  }
  TUT.target = null;
  document.querySelectorAll('.cell.tut').forEach(el => el.classList.remove('tut'));
  // 讲解阶段
  const intro = tutIntroSteps();
  if (TUT.step < intro.length) {

    p.innerHTML = `<span class="tp-tag">🎓 ${tt('新手教学', 'TUTORIAL')} · ${s.tag}</span>${s.text}<br><button class="btn primary" id="tutNext">${TUT.step === intro.length - 1 ? tt('开始推理', 'Start Deducing') : tt('下一步', 'Next')}</button>`;

    if (el) el.textContent = remain > 0 ? `${Math.floor(remain / 60)}:${String(Math.max(0, remain) % 60).padStart(2, '0')}` : '0:00';

  };
  tick();
  examTimerId = setInterval(tick, 1000);
}
